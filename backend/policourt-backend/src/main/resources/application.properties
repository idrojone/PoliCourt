spring.application.name=PoliCourt
server.port=4001
server.address=0.0.0.0


# --- 1. DATASOURCE (Base de Datos) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/test?stringtype=unspecified
spring.datasource.username=test
spring.datasource.password=test

# --- 2. FLYWAY (Gestión de Esquema) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- 3. JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=INFO
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# --- 5. DOCUMENTACIÓN (Swagger) ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# --- 6. CORS --- 
cors.allowed-origins=http://localhost:4000,http://localhost:4001

# --- 7. FLYWAY MAVEN PLUGIN ---
flyway.url=jdbc:postgresql://localhost:5433/test
flyway.user=test
flyway.password=test
flyway.cleanDisabled=false

# --- 8. JWT AUTHENTICATION ---
# Secret must be at least 256 bits (32 chars)
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.access-token.expiration-ms=900000 
# 15 minutes is 900000
jwt.refresh-token.expiration-ms=604800000
# 7 days is 604800000
