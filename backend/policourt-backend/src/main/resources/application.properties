spring.application.name=PoliCourt
server.port=4001
server.address=0.0.0.0


# --- 1. DATASOURCE (Base de Datos) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/test?stringtype=unspecified
spring.datasource.username=test
spring.datasource.password=test

# --- 2. FLYWAY (Gestión de Esquema) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- 3. JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=INFO
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# --- 5. DOCUMENTACIÓN (Swagger) ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# --- 6. CORS --- 
cors.allowed-origins=http://localhost:4000,http://localhost:4001

# --- 7. FLYWAY MAVEN PLUGIN ---
flyway.url=jdbc:postgresql://localhost:5433/test
flyway.user=test
flyway.password=test
flyway.cleanDisabled=false

# --- 8. JWT AUTHENTICATION ---
# Secret must be at least 256 bits (32 chars)
jwt.secret=${JWT_SECRET:}
jwt.access-token.expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
# 15 minutes is 900000
jwt.refresh-token.expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS}
# 7 days is 604800000

# --- 9. STRIPE ---
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# --- 10. SECURITY OVERRIDES ---
app.security.jwt-check.enabled=true
app.security.admin-check.enabled=true
