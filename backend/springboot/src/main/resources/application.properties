spring.application.name=springboot
server.port=4002
server.address=0.0.0.0

# --- 1. DATASOURCE (Base de Datos) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=idrojone
spring.datasource.password=idrojone_user
spring.datasource.driver-class-name=org.postgresql.Driver

# --- 2. FLYWAY (Gestión de Esquema) ---
spring.flyway.enabled=true
# IMPORTANTE: Si la DB ya tiene tablas (o si falló una migración antes),
# esto evita que Flyway lance error. Crea una línea base si no existe.
spring.flyway.baseline-on-migrate=true

# --- 3. JPA / HIBERNATE ---
# 'validate': Hibernate revisa que tus @Entity de Java coincidan con las tablas creadas por Flyway.
# Si no coinciden, la app no arranca (te protege de errores).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=DEBUG

# Evitamos que Spring intente ejecutar data.sql o schema.sql nativos,
# ya que usamos Flyway para eso.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# --- 4. SEGURIDAD (JWT) ---
jwt.secret=winteriscomingwinteriscomingwinteriscoming
jwt.expiration=3600000
jwt.refreshExpiration=86400000

# --- 5. DOCUMENTACIÓN (Swagger / OpenAPI) ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
# Para que Swagger ordene los endpoints alfabéticamente (opcional)
springdoc.swagger-ui.operations-sorter=alpha

# --- 6. CORS ---
# Nota: Esto solo define la variable, recuerda usarla en tu @Configuration de Cors
cors.allowed-origins=http://localhost:4000,http://gateway:4001,http://localhost:4002

# --- 7. FLYWAY MAVEN PLUGIN ---
# Propiedades para que el plugin de Maven 'flyway:migrate' funcione directamente.
# OJO: Se duplican los valores porque el plugin de Flyway no resuelve los
# placeholders (${...}) de Spring en este archivo. Es una limitación técnica.
flyway.url=jdbc:postgresql://localhost:5432/users_db
flyway.user=idrojone
flyway.password=idrojone_user
