spring.application.name=springboot
server.port=4002
server.address=0.0.0.0

# DB Config
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=idrojone
spring.datasource.password=idrojone_user
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Schema Init ---
# never: No ejecuta schema.sql (solo para setup inicial manual)
# always: Ejecuta cada vez (peligroso en dev, rompe si ENUMs ya existen)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=DEBUG


#JWT
jwt.secret=winteriscomingwinteriscomingwinteriscoming
jwt.expiration=3600000
jwt.refreshExpiration=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# CORS - orígenes permitidos (separá por comas). Ajustá para producción y usá variables de entorno si corresponde.
cors.allowed-origins=http://localhost:4000,http://gateway:4001,http://localhost:4002

# Flyway
spring.flyway.enabled=true
