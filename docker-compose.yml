services:
  db:
    image: "${POSTGRES_IMAGE}"
    container_name: test
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
    volumes:
      - test_db_data:/var/lib/postgresql/data


  mongodb:
    image: mongo:latest
    container_name: mongodb_server
    restart: always
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq: 
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"   # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT}:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped



  springboot:
    build:
      context: ./backend/policourt-backend
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/test?stringtype=unspecified
      - SPRING_DATASOURCE_USERNAME=test
      - SPRING_DATASOURCE_PASSWORD=test
      - FLYWAY_URL=jdbc:postgresql://db:5432/test
      - FLYWAY_USER=test
      - FLYWAY_PASSWORD=test
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      - db
      - stripe


  fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - fastapi
      - springboot

  stripe:
    image: stripe/stripe-cli:latest
    stdin_open: true
    tty: true
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY:-}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "-c"]
    command: ["/scripts/stripe-listen.sh"]

volumes:
  test_db_data:
  mongo_data:
  rabbitmq_data:
