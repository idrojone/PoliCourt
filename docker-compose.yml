services:
  db:
    image: "${POSTGRES_IMAGE}"
    container_name: test
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
    volumes:
      - test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s


  mongodb:
    image: mongo:latest
    container_name: mongodb_server
    restart: always
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq: 
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"   # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT}:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      sleep 5 &&
      ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} &&
      wait

  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama-gpu
    profiles:
      - gpu
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    gpus: all
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      sleep 5 &&
      ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} &&
      wait


  springboot:
    build:
      context: ./backend/policourt-backend
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./backend/policourt-backend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/test?stringtype=unspecified
      - SPRING_DATASOURCE_USERNAME=test
      - SPRING_DATASOURCE_PASSWORD=test
      - FLYWAY_URL=jdbc:postgresql://db:5432/test
      - FLYWAY_USER=test
      - FLYWAY_PASSWORD=test
      - NOTIFICATION_SERVICE_BASE_URL=http://nest-api-gateway:4002
    depends_on:
      db:
        condition: service_healthy


  fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
    depends_on:
      db:
        condition: service_healthy

  frontend:
    env_file:
      - ./frontend/.env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - fastapi
      - springboot

  nest-api-gateway:
    build:
      context: ./backend/nest
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
        APP_MAIN_PATH: dist/apps/nest/main.js
    env_file:
      - ./backend/nest/apps/api-gateway/.env
    environment:
      - PORT=4002
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
    ports:
      - "4002:4002"
    volumes:
      - ./backend/nest/uploads:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy

  nest-notifications:
    build:
      context: ./backend/nest
      dockerfile: Dockerfile
      args:
        APP_NAME: notifications
        APP_MAIN_PATH: dist/apps/notifications/main.js
    env_file:
      - ./backend/nest/.env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_ENABLED=true
    depends_on:
      rabbitmq:
        condition: service_healthy

  request-monitor:
    build:
      context: ./backend/nest
      dockerfile: Dockerfile
      args:
        APP_NAME: request-monitor
        APP_MAIN_PATH: dist/apps/request-monitor/main.js
    env_file:
      - ./backend/nest/apps/request-monitor/.env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/request-monitor?authSource=admin
      - USER_SERVICE_BASE_URL=http://springboot:4001
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
      springboot:
        condition: service_started

  stripe:
    image: stripe/stripe-cli:latest
    stdin_open: true
    tty: true
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY:-}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "-c"]
    command: ["/scripts/stripe-listen.sh"]

volumes:
  test_db_data:
  mongo_data:
  rabbitmq_data:
  ollama_data:
